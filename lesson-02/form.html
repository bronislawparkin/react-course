<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/submit" method="POST">
  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required />
  <label for="password">Password:</label>
  <input type="password" id="password" name="password" required />
  <br>
  <br>
<label for="email">Email:</label>
  <input type="email" id="email" name="email" required />
  
  <label for="tel">Telephone:</label>
  <input type="tel" id="tel" name="tel" required />
  <br>
  <br>
  <label for="date">Дата рождения:</label>
  <input type="date" id="date" name="date" required />
  <fieldset>
  <legend>Пол:</legend>
  <label><input type="radio" name="gender" value="m" /> М</label>
  <label><input type="radio" name="gender" value="f" /> Ж</label>
  </fieldset>
  <fieldset>
  <legend>Интересы (выберите несколько):</legend>
    <input type="checkbox" id="int1" name="interests[]" value="coding" />
    <label for="int1">Программирование</label>
    <input type="checkbox" id="int2" name="interests[]" value="design" />
    <label for="int2">Дизайн</label>
    <input type="checkbox" id="int3" name="interests[]" value="marketing" />
    <label for="int3">Маркетинг</label>
    <input type="checkbox" id="int4" name="interests[]" value="photo" />
    <label for="int4">Фото</label>
</fieldset>
<label for="city">Город:</label>
  <select id="city" name="city" placeholder="Выберите вариант">
    <option value="msk">Москва</option>
    <option value="spb">Санкт-Петербург</option>
  </select>
  <div class="form-group">
  <label for="resume">Резюме / О себе:</label>
  <textarea 
    id="resume" 
    name="resume" 
    rows="6" 
    placeholder="Кратко опишите опыт, ключевые навыки и карьерные цели..."
    maxlength="150"
    spellcheck="true"
    aria-describedby="resume-hint"
    required
  ></textarea>
  <span id="resume-hint" class="form-hint">Максимум 150 символов</span>
  <div class="form-group">
  <label for="consent" class="consent-label">
    <input type="checkbox" id="consent" name="consent" value="1" required>
    <span>Я ознакомлен(а) и даю согласие на обработку моих персональных данных в соответствии с <a href="/privacy-policy" target="_blank" rel="noopener noreferrer">Политикой конфиденциальности</a></span>
  </label>
  <p class="error-hint" role="alert" id="consent-error" hidden>Для отправки формы необходимо подтвердить согласие</p>
  <p>
  <button type="submit">Отправить</button>
  </p>
</div>
</div>
</body>
</html>
